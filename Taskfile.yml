version: '3'

vars:
  APP_DIR: sogon

tasks:
  dev:
    desc: "개발 서버 실행 (Next.js dev mode)"
    dir: "{{.APP_DIR}}"
    cmd: pnpm dev

  build:
    desc: "프로덕션 빌드"
    dir: "{{.APP_DIR}}"
    cmd: pnpm build

  start:
    desc: "프로덕션 서버 실행 (빌드 후 실행)"
    dir: "{{.APP_DIR}}"
    deps: [build]
    cmd: pnpm start

  lint:
    desc: "ESLint 실행"
    dir: "{{.APP_DIR}}"
    cmd: pnpm lint

  install:
    desc: "패키지 설치"
    dir: "{{.APP_DIR}}"
    cmd: pnpm install

  update-check:
    desc: "업데이트 가능한 패키지 목록 확인"
    dir: "{{.APP_DIR}}"
    cmd: pnpm outdated

  update:
    desc: "모든 패키지를 package.json 범위 내 최신 버전으로 업데이트"
    dir: "{{.APP_DIR}}"
    cmd: pnpm update

  deploy:
    desc: "프로덕션 배포 (Vercel)"
    cmd: vercel --prod
